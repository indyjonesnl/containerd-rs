name: conformance-sig-auth

# Manual: run the sig-auth [Conformance] slice on containerd-rs.
# ServiceAccount tokens, projected SA volumes, and related authn/authz conformance.
#
# Conformance is expensive and CI minutes are limited, so this is manual only.
# Validate locally first with: make conformance-docker FOCUS='\[sig-auth\].*\[Conformance\]'
on:
  workflow_dispatch:
    inputs:
      k8s_version:
        description: "Kubernetes version (cluster + conformance image)"
        default: "v1.35.6"
      focus:
        description: "ginkgo --focus regex (narrow to a subset for a cheap validation run)"
        default: '\[sig-auth\].*\[Conformance\]'

permissions:
  contents: read

jobs:
  sig-auth:
    uses: ./.github/workflows/conformance-reusable.yml
    with:
      focus: ${{ inputs.focus }}
      artifact_name: conformance-sig-auth
      k8s_version: ${{ inputs.k8s_version }}
