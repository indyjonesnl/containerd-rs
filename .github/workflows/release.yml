name: release

# Versioned releases: static musl binaries (amd64 + arm64) as tarballs on a
# GitHub Release, and a multi-arch container image on GHCR. The crate version in
# [workspace.package] is the single source of truth; a `vX.Y.Z` tag MUST match it.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish Release + push image to GHCR (false = dry run)"
        type: boolean
        default: false

permissions:
  contents: write # create GitHub Release
  packages: write # push to GHCR

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build static musl binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The git tag and the crate version are one thing. A tag push whose name
      # doesn't match [workspace.package] version is a mistake — fail loudly
      # rather than ship an image whose `--version` lies. (Skipped on dry runs.)
      - name: Verify git tag matches workspace version
        if: github.event_name == 'push'
        run: |
          tag="${GITHUB_REF_NAME#v}"
          crate_ver="$(sed -n '/^\[workspace.package\]/,/^\[/{s/^version *= *"\(.*\)"/\1/p}' Cargo.toml)"
          echo "tag=$tag workspace version=$crate_ver"
          if [ "$tag" != "$crate_ver" ]; then
            echo "::error::git tag v$tag != [workspace.package] version $crate_ver — bump Cargo.toml before tagging" >&2
            exit 1
          fi

      - name: Install Rust + musl targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl, aarch64-unknown-linux-musl

      - name: Install zig (cross-linker for cargo-zigbuild)
        uses: mlugg/setup-zig@v1
        with:
          version: 0.13.0

      - name: Install cargo-zigbuild
        run: cargo install cargo-zigbuild --locked

      - name: Build (amd64 + arm64, static musl)
        run: |
          for t in x86_64-unknown-linux-musl aarch64-unknown-linux-musl; do
            cargo zigbuild --release --target "$t" -p containerd-rs
          done

      - name: Stage binaries + tarballs
        run: |
          VERSION="${GITHUB_REF_NAME}"
          [ "${{ github.event_name }}" = "workflow_dispatch" ] && VERSION="dev-${GITHUB_SHA::8}"
          mkdir -p dist/amd64 dist/arm64 out
          cp target/x86_64-unknown-linux-musl/release/containerd-rs  dist/amd64/
          cp target/aarch64-unknown-linux-musl/release/containerd-rs dist/arm64/
          tar -czf "out/containerd-rs_${VERSION}_linux_amd64.tar.gz" -C dist/amd64 .
          tar -czf "out/containerd-rs_${VERSION}_linux_arm64.tar.gz" -C dist/arm64 .
          ( cd out && sha256sum *.tar.gz > "containerd-rs_${VERSION}_checksums.txt" )
          ls -l out

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: containerd-rs-binaries
          path: |
            out/
            dist/
          retention-days: 7

  publish:
    name: publish release + image
    needs: build
    runs-on: ubuntu-latest
    # Publish on a tag push, or a manual run with publish=true. Dry runs skip this.
    if: github.event_name == 'push' || inputs.publish
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: containerd-rs-binaries

      - name: Compute version
        id: ver
        run: |
          VERSION="${GITHUB_REF_NAME}"
          [ "${{ github.event_name }}" = "workflow_dispatch" ] && VERSION="dev-${GITHUB_SHA::8}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release with binary tarballs
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            out/containerd-rs_*_linux_amd64.tar.gz
            out/containerd-rs_*_linux_arm64.tar.gz
            out/containerd-rs_*_checksums.txt
          generate_release_notes: true

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.release
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/indyjonesnl/containerd-rs:${{ steps.ver.outputs.version }}
            ghcr.io/indyjonesnl/containerd-rs:latest
            ghcr.io/indyjonesnl/containerd-rs:${{ github.sha }}
