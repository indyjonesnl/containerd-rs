name: build

on:
  push:
    branches: [main]
  pull_request:

# Cheap, fast build/test gate that runs on every push/PR. Mirrors `make check`
# exactly so local validation predicts CI (saves limited CI minutes).
jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          set -euo pipefail
          rustup show active-toolchain || rustup toolchain install stable
          rustup component add rustfmt clippy

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: make fmt-check

      - name: Clippy (warnings as errors)
        run: make lint

      - name: Tests
        run: make test
