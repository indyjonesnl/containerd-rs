name: conformance-sig-instrumentation

# Manual: run the sig-instrumentation [Conformance] slice on containerd-rs.
# Events API lifecycle — create/patch/delete/list.
#
# Conformance is expensive and CI minutes are limited, so this is manual only.
# Validate locally first with: make conformance-docker FOCUS='\[sig-instrumentation\].*\[Conformance\]'
on:
  workflow_dispatch:
    inputs:
      k8s_version:
        description: "Kubernetes version (cluster + conformance image)"
        default: "v1.35.6"
      focus:
        description: "ginkgo --focus regex (narrow to a subset for a cheap validation run)"
        default: '\[sig-instrumentation\].*\[Conformance\]'

permissions:
  contents: read

jobs:
  sig-instrumentation:
    uses: ./.github/workflows/conformance-reusable.yml
    with:
      focus: ${{ inputs.focus }}
      artifact_name: conformance-sig-instrumentation
      k8s_version: ${{ inputs.k8s_version }}
