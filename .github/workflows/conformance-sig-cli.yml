name: conformance-sig-cli

# Manual: run the sig-cli [Conformance] slice on containerd-rs.
# kubectl behaviours — create/apply/run/expose/patch/label and friends.
#
# Conformance is expensive and CI minutes are limited, so this is manual only.
# Validate locally first with: make conformance-docker FOCUS='\[sig-cli\].*\[Conformance\]'
on:
  workflow_dispatch:
    inputs:
      k8s_version:
        description: "Kubernetes version (cluster + conformance image)"
        default: "v1.35.6"
      focus:
        description: "ginkgo --focus regex (narrow to a subset for a cheap validation run)"
        default: '\[sig-cli\].*\[Conformance\]'

permissions:
  contents: read

jobs:
  sig-cli:
    uses: ./.github/workflows/conformance-reusable.yml
    with:
      focus: ${{ inputs.focus }}
      artifact_name: conformance-sig-cli
      k8s_version: ${{ inputs.k8s_version }}
